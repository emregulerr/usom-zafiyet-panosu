name: Update Vulnerability Data

on:
  schedule:
    # Her gün gece yarısı (UTC), yani Türkiye saati ile 03:00'te çalışır.
    - cron: '0 0 * * *'
  # GitHub arayüzünden "Run workflow" butonu ile manuel olarak tetiklemeye izin verir.
  workflow_dispatch:

jobs:
  update-data:
    # Bu işin çalışacağı sanal makine tipi
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      # 1. Adım: Proje dosyalarını çalışacak sanal makineye indirir.
      # Node.js 24 uyumluluğu için v5 (Haziran 2026 deprecation deadline).
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. Adım: Belirtilen Python sürümünü kurar (Node.js 24 uyumlu v6).
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      # 3. Adım: requirements.txt dosyasında listelenen gerekli Python kütüphanelerini yükler.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Adım: Ana Python script'ini çalıştırır.
      # Bu script, output/ klasöründeki CSV ve resim dosyalarını oluşturacak/güncelleyecektir.
      # USOM_API_URL secret'ı tanımlıysa default usom.gov.tr endpoint'ini
      # override eder (siberguvenlik.gov.tr'ye geçiş için).
      - name: Run data fetch and analysis script
        env:
          USOM_API_URL: ${{ secrets.USOM_API_URL }}
        run: python main.py

      # 5. Adım: Eğer output/ klasöründe bir değişiklik varsa (ki her gün olacak),
      # bu değişiklikleri repoya otomatik olarak "commit"ler ve "push"lar.
      # Not: output/charts/ .gitignore ile dışlanır; sadece CSV ve PNG'ler commit'lenir.
      - name: Commit and push if there are changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Veri ve görseller otomatik güncellendi"
          file_pattern: 'output/vulnerabilities_data.csv output/images/*'
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
          commit_author: "GitHub Actions Bot <actions@github.com>"

      # 6. Adım: İnteraktif HTML panoyu (output/charts/) GitHub Pages'e deploy et.
      # Settings → Pages → Source: "Deploy from a branch" + branch: "gh-pages" / "/" olarak
      # bir kez yapılandırılmalı. URL: https://<user>.github.io/<repo>/
      - name: Deploy interactive dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/charts
          publish_branch: gh-pages
          user_name: "GitHub Actions Bot"
          user_email: "actions@github.com"
          commit_message: "🚀 İnteraktif pano güncellendi"
